<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{{ url_for('static',filename='style.css')}}">
    <script src="https://cdn.jsdelivr.net/npm/echarts@6.0.0/dist/echarts.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>
<style>

</style>

<body>
    <h1>pm25數據列表</h1>
    <a href="/update-db">更新資料庫</a>
    <h1>最新更新時間: {{ max_date }}</h1>
    <div id="main" style="width: 800px;height:400px;"></div>
    <div id="county" style="width: 800px;height:400px;" hidden></div>
    <div style="margin: 12px;">
        <label for="countySelect">選擇縣市</label>
        <select name="countySelect" id="countySelect">
            {% for county in countys %}
            <option value="{{county}}">{{county}}</option>
            {% endfor %}
        </select>
        <button id="loadContainer" onclick="drawCountyChart()">確定</button>
    </div>

    <div id="tableContainer">
        <table border="1">
            <thead>
                <tr>
                    {% for col in columns %}
                    <th>{{col}}</th>
                    {% endfor %}
                </tr>
            </thead>
            <tbody>
                {% for value in values %}
                <tr>
                    {% for data in value %}
                    <td>{{data}}</td>
                    {% endfor %}
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
<script type="text/javascript">

    // 基于准备好的dom，初始化echarts实例
    const chart1 = echarts.init(document.getElementById('main'));
    const chart2 = echarts.init(document.getElementById('county'));
    const countyEl = document.getElementById('county')
    const countySelectEl = document.querySelector("#countySelect");
    console.log(countySelectEl)

    drawChart(chart1, "/avg-pm25", "各縣市PM2.5平均值", "county", "pm25", "blue");


    function drawCountyChart() {
        let county = countySelectEl.value;
        countyEl.hidden = false;
        console.log(county);
        drawChart(chart2, `/county-pm25/${county}`, `${county}PM2.5數據圖`, "site", "pm25", "red");
    }

    function drawChart(chart, url, title, xkey, ykey, color) {
        $.ajax(
            {
                url: url,
                type: "GET",
                dataType: "json",
                success: (result) => {
                    // 指定图表的配置项和数据
                    var option = {
                        title: {
                            text: `${title}`
                        },
                        tooltip: {},
                        legend: {
                            data: ['pm2.5']
                        },
                        xAxis: {
                            data: result[xkey]
                        },
                        yAxis: {},
                        series: [
                            {
                                itemStyle: {
                                    color: color
                                },
                                name: 'pm2.5',
                                type: 'bar',
                                data: result[ykey]
                            }
                        ]
                    };
                    // 使用刚指定的配置项和数据显示图表。
                    chart.setOption(option);
                },
            }
        );
    }


</script>

</html>
