<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body {
        text-align: center;
        background-color: bisque;
        font-size: 20px;
    }

    .price {
        color: red;
    }

    .image {
        border: 1px solid black;
        padding: 10px;
        background-color: white;
        border-radius: 10px;
    }

    .book_name {
        background-color: rgb(171, 58, 212);
        color: white;
    }
</style>

<body>
    <h1>書籍列表</h1>
    {% for id in books %}
    <p class="book_name">書名:{{books[id]["name"]}}</p>
    <p>價格:<span class="price">${{books[id]["price"]}}</span></p>
    <p><img class="image" src="{{books[id]['image_url']}}" alt="{{books[id]['name']}}"></p>
    <a href="https://www.books.com.tw">購買連結</a>
    <hr>
    {% endfor %}

</body>

</html>
